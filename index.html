<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Contable XL</title>
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./bootstrap.bundle.min.js"></script>
    <script src="./index.js" defer></script>
</head>
<body class="min-vh-100">

    <header class="bg-premium-gradient text-white text-center py-2 shadow-lg mb-5 rounded-bottom-5">
        <h1 class="display-4 fw-bold mb-3">Libro Contable</h1>
        <p class="fs-4 opacity-75">Gestión financiera eficiente y clara</p>
    </header>

    <main class="container-lg pb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                
                <!-- Formulario más grande -->
                <div class="bg-glass p-4 p-md-5 rounded-5 shadow-lg mb-5 border border-white border-opacity-25">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
                        <h2 class="display-6 fw-bold mb-0">Nuevo Registro</h2>
                        <button class="btn btn-success btn-lg px-5 py-3 fs-4 rounded-4 shadow" id="afegir">
                            <i class="bi bi-plus-circle me-2"></i>Añadir
                        </button>
                    </div>

                    <form id="ledger-form" class="row g-4">
                      <div class="col-md-6">
                        <label for="fecha" class="form-label fs-5 fw-semibold">Fecha</label>
                        <input type="date" class="form-control form-control-lg fs-5 p-3 rounded-4" id="fecha" title="Ejemplo: 07/05/2026" required>
                      </div>
                        <div class="col-md-6">
                            <label for="concepto" class="form-label fs-5 fw-semibold">Concepto</label>
                            <input type="text" class="form-control form-control-lg fs-5 p-3 rounded-4" id="concepto" pattern="^[A-Za-z0-9À-ÿ\s\.,'()\-]+$" title="Ejemplos: Pago luz, Compra (Mercadona), Nómina 05-26" placeholder="Ej. Pago de Alquiler" required>
                        </div>
                        <div class="col-md-6">
                            <label for="dh" class="form-label fs-5 fw-semibold">D/H</label>
                            <select class="form-select form-select-lg fs-5 p-3 rounded-4" id="dh">
                                <option value="D">Debe (Salida - Ej: Pago)</option>
                                <option value="H">Haber (Entrada - Ej: Ingreso)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="importe" class="form-label fs-5 fw-semibold">Importe</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light border-end-0 px-4">€</span>
                                <input type="text" class="form-control fs-5 p-3 rounded-end-4 border-start-0" id="importe" pattern="^-?\d+([.,]\d{1,2})?$" title="Ejemplos: 150.50, -45.20 o 1200" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="saldo" class="form-label fs-5 fw-semibold">Saldo</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light border-end-0 px-4">€</span>
                                <input type="text" class="form-control fs-5 p-3 rounded-end-4 border-start-0" id="saldo" pattern="^-?\d+([.,]\d{1,2})?$" title="Ejemplos: 1500.00 o -20.50" placeholder="0.00" required>
                            </div>
                        </div>
                        <p id="missatgeError"></p>
                    </form>
                </div>

                <!-- Tabla más grande -->
                <div class="bg-white rounded-5 shadow-lg overflow-hidden border border-light">
                    <div class="table-responsive">
                        <table class="table table-hover table-borderless align-middle mb-0">
                            <thead class="table-light">
                                <tr class="fs-5">
                                    <th scope="col" class="py-4 ps-5">Acción</th>
                                    <th scope="col" class="py-4">Fecha</th>
                                    <th scope="col" class="py-4">Concepto</th>
                                    <th scope="col" class="py-4 text-center">D/H</th>
                                    <th scope="col" class="py-4 text-end">Importe</th>
                                    <th scope="col" class="py-4 text-end pe-5">Saldo</th>
                                </tr>
                            </thead>
                            <tbody id="contingut" class="fs-5">
                                <!-- Datos dinámicos -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
