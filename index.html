<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro contable</title>
    <script src="./index.js"></script>
    <link rel="stylesheet" href="./bootstrap.min.css">
    <script src="./bootstrap.bundle.min.js"></script>
    <script src="./data.json"></script>

</head>
<body>

   <div class="container-fluid mt-5">
<div class="row ">
    <div class="col-12 p-0">
        <div class="bg-primary text-white text-center p-4">
            <h2 class="fs-3">Libro contable</h2>
          

        </div>  
   </div>
   <div class="col-3"></div>
      
               
                <form class="col-6"> 
                    <div class="d-flex justify-content-start mt-3 p-3">
                    <button class="btn btn-success" id="afegir">Añadir</button>
                </div> 
<div class="mb-3">
  <label for="concepto" class="form-label">Concepto</label>
  <input type="text" class="form-control" id="concepto" pattern="^[a-zA-Z\s]+$" placeholder="Concepto" required>
</div>
<div class="mb-3">
<label for="dh" class="form-label">DH</label>
  <select class="form-control" id="dh">
    <option value="D">D</option>
    <option value="H">H</option>
  </select>
</div>
<div class="mb-3">
  <label for="importe" class="form-label">Importe</label>
  <input type="text" class="form-control" id="importe" pattern="^\d+(\.\d+)?$" placeholder="Importe" required>
</div>
<div class="mb-3">
  <label for="saldo" class="form-label">Saldo</label>
  <input type="text" class="form-control" id="saldo" pattern="^\d+(\.\d+)?$" placeholder="Saldo" required>
</div>

</form>
       
          <div class="col-3"></div>
  
</div>
<div class="row pt-5">
    <div class="col-1"> </div>
 
    <div class="col-10"> 
    <table class="table table-striped">
        <thead>
            <tr>
                <th scope="col">Borrar</th>
                <th scope="col">Fecha</th>
                <th scope="col">Concepto</th>
                <th scope="col">D/H</th>
                <th scope="col">Importe</th>
                <th scope="col">Saldo</th>
            </tr>
        </thead>
        <tbody id="contingut">
            
        </tbody>
    </table>
    </div>
       <div class="col-1"></div>
</div>

   </div>
</body>
</html>
